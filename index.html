<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Brew Haven Cafe</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

    <!-- HERO -->

    <section class="hero">

        <div class="overlay"></div>

        <div class="hero-content">

            <h1>BREW HAVEN</h1>

            <p>Fresh Coffee • Cozy Vibes • Delicious Food</p>

        </div>

    </section>

    <!-- FILTERS -->

    <section class="filters">

        <div class="filter-row" id="categoryFilters">

            <!-- Dynamic Category Filters -->

        </div>

        <div class="filter-row" id="typeFilters">

            <button class="filter-btn active" data-type="All">
                All
            </button>

            <button class="filter-btn" data-type="Veg">
                Veg
            </button>

            <button class="filter-btn" data-type="Non Veg">
                Non Veg
            </button>

        </div>

    </section>

    <!-- MENU -->

    <section class="container">

        <div class="menu-grid" id="menuGrid">

        </div>

    </section>

    <!-- FOOTER -->

    <footer>

        <h2>BREW HAVEN</h2>

        <p>Open Daily • 10 AM – 11 PM</p>

    </footer>

    <script src="js/script.js"></script>

</body>

</html>
